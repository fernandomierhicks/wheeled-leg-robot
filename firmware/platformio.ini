; PlatformIO configuration for Arduino UNO R4 WiFi
; Two-wheeled legged balancing robot firmware

; ── Shared settings ──────────────────────────────────────────────────────────
[env]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 1000000
build_flags =
    -DLOOP_RATE_HZ=500
    -DCAN_BAUD=1000000
    -DIMU_RATE_HZ=400
lib_deps =
    ; BNO086 (patched Adafruit lib in lib/Adafruit_BNO08x — 3 MHz SPI, tight-spin INT)
    adafruit/Adafruit BusIO
    adafruit/Adafruit Unified Sensor
    ; CAN — built into Arduino UNO R4 framework, no lib_dep needed
    ; OTA updates via WiFi
    jandrassy/ArduinoOTA @ ^1.1.1

; ── USB upload (default) ─────────────────────────────────────────────────────
[env:uno_r4_wifi]
build_flags =
    ${env.build_flags}
    -DNO_CAN

; ── IMU-only bench test (USB upload) ────────────────────────────────────────
[env:imu_only]
build_flags =
    ${env.build_flags}
    -DIMU_ONLY

; ── Debug harness (USB upload) ──────────────────────────────────────────────
[env:debug]
build_flags =
    ${env.build_flags}
    -DDEBUG_BUILD
build_src_filter = +<*> -<main.cpp>

; ── WiFi telemetry + commands (USB upload) ─────────────────────────────────
[env:wifi]
build_flags =
    ${env.build_flags}
    -DUSE_WIFI=1

; ── OTA upload via WiFi ──────────────────────────────────────────────────────
[env:ota]
build_flags =
    ${env.build_flags}
    -DUSE_WIFI=1
upload_protocol = espota
upload_port = BalanceBot.local   ; mDNS hostname set in config.h
