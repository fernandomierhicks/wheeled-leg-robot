; PlatformIO configuration for Arduino UNO R4 WiFi
; Two-wheeled legged balancing robot firmware

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4wifi
framework = arduino

; Serial monitor
monitor_speed = 115200

; OTA upload via ESP32-S3 coprocessor
; upload_protocol = espota
; upload_port = robot.local  ; or IP address

; Build flags
build_flags =
    -DLOOP_RATE_HZ=500
    -DCAN_BAUD=1000000
    -DIMU_RATE_HZ=500

; Libraries
lib_deps =
    ; BNO086 (SparkFun Qwiic)
    sparkfun/SparkFun BNO08x Cortex Based IMU @ ^1.0.3
    ; CAN (hardware CAN on RA4M1)
    arduino-libraries/Arduino_CAN @ ^1.0.0
