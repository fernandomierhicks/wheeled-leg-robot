; PlatformIO configuration for Arduino UNO R4 WiFi
; Two-wheeled legged balancing robot firmware

; ── Shared settings ──────────────────────────────────────────────────────────
[env]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 115200
build_flags =
    -DLOOP_RATE_HZ=500
    -DCAN_BAUD=1000000
    -DIMU_RATE_HZ=500
lib_deps =
    ; BNO086 (SparkFun Qwiic)
    sparkfun/SparkFun BNO08x Cortex Based IMU @ ^1.0.3
    ; CAN — built into Arduino UNO R4 framework, no lib_dep needed
    ; OTA updates via WiFi
    jandrassy/ArduinoOTA @ ^1.1.1

; ── USB upload (default) ─────────────────────────────────────────────────────
[env:uno_r4_wifi]

; ── OTA upload via WiFi ──────────────────────────────────────────────────────
[env:ota]
upload_protocol = espota
upload_port = BalanceBot.local   ; mDNS hostname set in config.h
