[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 921600
build_flags =
    -DSERIAL_BAUD=921600
    -DBNO_CS_PIN=10
    -DBNO_INT_PIN=2
    -DBNO_RST_PIN=3
    -DBNO_SPI_SPEED=3000000
lib_deps =
    sparkfun/SparkFun BNO08x Cortex Based IMU @ ^1.0.3
    jandrassy/ArduinoOTA@^1.1.1

[env:ota]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 921600
build_flags =
    -DSERIAL_BAUD=921600
    -DBNO_CS_PIN=10
    -DBNO_INT_PIN=2
    -DBNO_RST_PIN=3
    -DBNO_SPI_SPEED=3000000
lib_deps =
    sparkfun/SparkFun BNO08x Cortex Based IMU @ ^1.0.3
    jandrassy/ArduinoOTA@^1.1.1
upload_protocol = custom
upload_port = 192.168.1.102
upload_command = curl -u arduino:arduino --data-binary @$SOURCE http://$UPLOAD_PORT:65280/sketch
